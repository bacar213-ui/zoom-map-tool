<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
  #searchBox { position:absolute; top:10px; left:10px; right:10px; z-index:10; }
  #searchInput {
    width:100%; box-sizing:border-box; padding:12px; font-size:16px;
    border-radius:8px; border:none;
  }
  #suggestions {
    background:white; border-radius:8px; margin-top:4px;
    max-height:250px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  .suggestion-item {
    padding:12px; font-size:14px; border-bottom:1px solid #eee; cursor:pointer;
  }
  .suggestion-item:hover { background:#f0f0f0; }
  #speedRow {
    background:white; border-radius:8px; margin-top:6px; padding:8px 12px;
    display:flex; align-items:center; gap:8px; font-size:14px;
  }
  #speedSelect { flex:1; padding:6px; font-size:14px; border-radius:6px; }
  #zoomRow {
    background:white; border-radius:8px; margin-top:6px; padding:8px 12px;
    display:flex; align-items:center; gap:8px; font-size:14px;
  }
  #zoomSelect { flex:1; padding:6px; font-size:14px; border-radius:6px; }
  #startOverlay {
    position:fixed; top:0; left:0; right:0; bottom:0; z-index:100;
    background:#111; display:flex; align-items:center; justify-content:center;
  }
  #startBtn {
    padding:18px 40px; font-size:20px; border-radius:12px; border:none;
    background:#1d4ed8; color:white; cursor:pointer;
  }
</style>
</head>
<body>

<div id="startOverlay">
  <button id="startBtn">Iniciar</button>
</div>

<div id="searchBox" style="display:none;">
  <input id="searchInput" type="text" placeholder="Escribe un bar, calle o lugar..." />
  <div id="speedRow">
    <label for="speedSelect">Duracion:</label>
    <select id="speedSelect">
      <option value="3000">Rapido (3s)</option>
      <option value="6000">Normal (6s)</option>
      <option value="8000" selected>Medio (8s)</option>
      <option value="12000">Lento (12s)</option>
      <option value="18000">Muy lento (18s)</option>
    </select>
  </div>
  <div id="zoomRow">
    <label for="zoomSelect">Zoom final:</label>
    <select id="zoomSelect">
      <option value="14">Lejano (calle general)</option>
      <option value="15">Medio-lejano</option>
      <option value="16" selected>Medio (edificio + entorno)</option>
      <option value="17">Cercano</option>
      <option value="18">Muy cercano</option>
      <option value="19">Maximo (detalle total)</option>
    </select>
  </div>
  <div id="suggestions"></div>
</div>
<div id="map"></div>

<script>
document.getElementById('startBtn').addEventListener('click', () => {
  entrarPantallaCompleta();
  document.getElementById('startOverlay').style.display = 'none';
  document.getElementById('searchBox').style.display = 'block';
});

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'esri-satellite': {
        type: 'raster',
        tiles: [
          'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
        ],
        tileSize: 256,
        attribution: 'Tiles &copy; Esri'
      }
    },
    layers: [
      {
        id: 'esri-satellite-layer',
        type: 'raster',
        source: 'esri-satellite',
        minzoom: 0,
        maxzoom: 19
      }
    ]
  },
  center: [2.1734, 41.3851],
  zoom: 3
});

const input = document.getElementById('searchInput');
const suggestionsBox = document.getElementById('suggestions');
const searchBox = document.getElementById('searchBox');
let debounceTimer;
let currentMarker = null;

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const query = input.value.trim();
  if (query.length < 3) { suggestionsBox.innerHTML = ''; return; }
  debounceTimer = setTimeout(() => buscarSugerencias(query), 300);
});

input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    clearTimeout(debounceTimer);
    const query = input.value.trim();
    if (query.length >= 3) buscarSugerencias(query);
  }
});

const LOCATIONIQ_KEY = 'PEGA_AQUI_TU_CLAVE';

function entrarPantallaCompleta() {
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (req) {
    req.call(el).catch(() => {});
  }
}

async function buscarSugerencias(query) {
  suggestionsBox.innerHTML = '<div class="suggestion-item">Buscando...</div>';
  try {
    let resultados = await intentarPhoton(query, map.getCenter());
    if (resultados.length === 0) {
      resultados = await intentarNominatim(query);
    }
    if (resultados.length === 0 && LOCATIONIQ_KEY !== 'PEGA_AQUI_TU_CLAVE') {
      resultados = await intentarLocationIQ(query);
    }
    if (resultados.length === 0) {
      suggestionsBox.innerHTML = '<div class="suggestion-item">Sin resultados</div>';
    } else {
      mostrarSugerencias(resultados);
    }
  } catch (err) {
    suggestionsBox.innerHTML = '<div class="suggestion-item">Error: ' + err.message + '</div>';
  }
}

async function intentarLocationIQ(query) {
  try {
    const url = 'https://eu1.locationiq.com/v1/search?key=' + LOCATIONIQ_KEY +
                '&q=' + encodeURIComponent(query) + '&format=json&limit=6&accept-language=es';
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data.map(r => ({
      texto: r.display_name,
      lon: parseFloat(r.lon),
      lat: parseFloat(r.lat)
    }));
  } catch (e) {
    return [];
  }
}

async function intentarPhoton(query, center) {
  try {
    const url = 'https://photon.komoot.io/api/?q=' + encodeURIComponent(query) +
                '&lat=' + center.lat + '&lon=' + center.lng + '&limit=6&lang=es';
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data || !Array.isArray(data.features)) return [];
    return data.features.map(f => ({
      texto: [f.properties.name, f.properties.street, f.properties.city, f.properties.country].filter(Boolean).join(', '),
      lon: f.geometry.coordinates[0],
      lat: f.geometry.coordinates[1]
    }));
  } catch (e) {
    return [];
  }
}

async function intentarNominatim(query) {
  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=6&addressdetails=1';
    const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data.map(r => ({
      texto: r.display_name,
      lon: parseFloat(r.lon),
      lat: parseFloat(r.lat)
    }));
  } catch (e) {
    return [];
  }
}

function mostrarSugerencias(resultados) {
  suggestionsBox.innerHTML = '';
  resultados.forEach(r => {
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.textContent = r.texto;
    div.addEventListener('click', () => {
      const duracion = parseInt(document.getElementById('speedSelect').value, 10);
      const zoomFinal = parseInt(document.getElementById('zoomSelect').value, 10);

      suggestionsBox.innerHTML = '';
      searchBox.style.display = 'none';
      entrarPantallaCompleta();

      if (currentMarker) currentMarker.remove();
      currentMarker = new maplibregl.Marker({ color: '#e11d1d' })
        .setLngLat([r.lon, r.lat])
        .addTo(map);

      setTimeout(() => {
        map.flyTo({ center: [r.lon, r.lat], zoom: zoomFinal, duration: duracion, curve: 1.42 });
      }, 1000);
    });
    suggestionsBox.appendChild(div);
  });
}
</script>
</body>
</html>
