<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  body { margin:0; padding:0; }
  #map { position:absolute; top:0; bottom:0; width:100%; }
  #searchBox { position:absolute; top:10px; left:10px; right:10px; z-index:10; }
  #searchInput {
    width:100%; box-sizing:border-box; padding:12px; font-size:16px;
    border-radius:8px; border:none;
  }
  #suggestions {
    background:white; border-radius:8px; margin-top:4px;
    max-height:250px; overflow-y:auto; box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  .suggestion-item {
    padding:12px; font-size:14px; border-bottom:1px solid #eee; cursor:pointer;
  }
  .suggestion-item:hover { background:#f0f0f0; }
</style>
</head>
<body>

<div id="searchBox">
  <input id="searchInput" type="text" placeholder="Escribe un bar, calle o lugar..." />
  <div id="suggestions"></div>
</div>
<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.stadiamaps.com/styles/alidade_satellite.json',
  center: [2.1734, 41.3851],
  zoom: 3
});

const input = document.getElementById('searchInput');
const suggestionsBox = document.getElementById('suggestions');
let debounceTimer;

input.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const query = input.value.trim();
  if (query.length < 3) { suggestionsBox.innerHTML = ''; return; }
  debounceTimer = setTimeout(() => buscarSugerencias(query), 300);
});

async function buscarSugerencias(query) {
  const center = map.getCenter();
  const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lat=${center.lat}&lon=${center.lng}&limit=6&lang=es`;
  const res = await fetch(url);
  const data = await res.json();
  suggestionsBox.innerHTML = '';
  data.features.forEach(f => {
    const p = f.properties;
    const texto = [p.name, p.street, p.city, p.country].filter(Boolean).join(', ');
    const div = document.createElement('div');
    div.className = 'suggestion-item';
    div.textContent = texto;
    div.addEventListener('click', () => seleccionarLugar(f));
    suggestionsBox.appendChild(div);
  });
}

function seleccionarLugar(feature) {
  const [lon, lat] = feature.geometry.coordinates;
  suggestionsBox.innerHTML = '';
  document.getElementById('searchBox').style.display = 'none';
  map.flyTo({ center: [lon, lat], zoom: 18, duration: 8000, curve: 1.42 });
}
</script>
</body>
</html>
